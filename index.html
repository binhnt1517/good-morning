<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good Morning, tiny M.</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Sacramento&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #ffe0ec 0%, #ffc1d6 30%, #ffb3c6 60%, #ffa6bb 100%);
    overflow: hidden;
    font-family: 'Quicksand', sans-serif;
  }

  /* Floating hearts */
  .hearts-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .heart {
    position: absolute;
    bottom: -60px;
    font-size: 20px;
    animation: floatUp linear infinite;
    opacity: 0.6;
  }

  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.6; }
    50%  { opacity: 0.8; }
    100% { transform: translateY(-110vh) rotate(360deg) scale(0.5); opacity: 0; }
  }

  /* Sun glow */
  .sun {
    position: fixed;
    top: -60px;
    right: -60px;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, #ffecb3 0%, #ffe0ec 50%, transparent 70%);
    border-radius: 50%;
    animation: sunPulse 3s ease-in-out infinite;
    z-index: 0;
  }

  @keyframes sunPulse {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50%      { transform: scale(1.15); opacity: 1; }
  }

  /* Card */
  .card {
    position: relative;
    z-index: 1;
    background: rgba(255, 255, 255, 0.75);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.5);
    border-radius: 28px;
    padding: 50px 44px 44px;
    max-width: 386px;
    width: 90%;
    text-align: center;
    box-shadow: 0 12px 48px rgba(255, 105, 135, 0.2);
    animation: cardIn 1s ease-out;
  }

  @keyframes cardIn {
    0%   { opacity: 0; transform: translateY(40px) scale(0.95); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  .flower {
    font-size: 48px;
    animation: wiggle 2s ease-in-out infinite;
    display: inline-block;
  }

  @keyframes wiggle {
    0%, 100% { transform: rotate(-8deg); }
    50%      { transform: rotate(8deg); }
  }

  .greeting {
    font-family: 'Sacramento', cursive;
    font-size: 52px;
    color: #e75480;
    margin: 16px 0 6px;
    animation: fadeSlideIn 1s ease-out 0.3s both;
  }

  .name {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 26px;
    color: #c44569;
    margin-bottom: 20px;
    animation: fadeSlideIn 1s ease-out 0.6s both;
  }

  .message {
    font-size: 15px;
    color: #8e4562;
    line-height: 1.7;
    animation: fadeSlideIn 1s ease-out 0.9s both;
  }

  @keyframes fadeSlideIn {
    0%   { opacity: 0; transform: translateY(16px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .sparkle {
    display: inline-block;
    animation: sparkle 1.5s ease-in-out infinite;
  }

  @keyframes sparkle {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.5; transform: scale(1.3); }
  }

  .divider {
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, #ffb3c6, #e75480, #ffb3c6);
    border-radius: 3px;
    margin: 20px auto;
    animation: fadeSlideIn 1s ease-out 0.8s both;
  }

  .footer {
    margin-top: 24px;
    font-size: 12px;
    color: #d4849b;
    animation: fadeSlideIn 1s ease-out 1.2s both;
  }
</style>
</head>
<body>

<div class="sun"></div>

<div class="hearts-container" id="hearts"></div>

<div class="card">
  <div class="flower">🌸</div>
  <div class="greeting">Good Morning</div>
  <div class="name">tiny M. <span class="sparkle">&#10022;</span></div>
  <div class="divider"></div>
  <p class="message">
    Hope your day is<br>
    as sweet and lovely as you are!<br>
    Smile big, shine bright,<br>
    and have the most wonderful day.
  </p>
</div>

<script>
  // Generate floating hearts
  const container = document.getElementById('hearts');
  const symbols = ['&#x1F497;', '&#x1F495;', '&#x1F49B;', '&#x1F33C;', '&#x1F338;', '&#x2728;'];

  for (let i = 0; i < 25; i++) {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
    heart.style.left = Math.random() * 100 + '%';
    heart.style.fontSize = (14 + Math.random() * 20) + 'px';
    heart.style.animationDuration = (6 + Math.random() * 8) + 's';
    heart.style.animationDelay = (Math.random() * 10) + 's';
    container.appendChild(heart);
  }
</script>

</body>
</html>
