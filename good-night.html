<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Good Night, tiny M. 🌙</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Sacramento&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      overflow: hidden;
      background: linear-gradient(180deg, #0b0d2a 0%, #1a1b4b 30%, #2d2065 55%, #4a2674 75%, #1a1b4b 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Quicksand', sans-serif;
    }

    /* ───── Stars canvas ───── */
    .stars-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle var(--dur) ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      0%   { opacity: var(--min-o); transform: scale(1); }
      100% { opacity: 1; transform: scale(1.3); }
    }

    /* ───── Shooting stars ───── */
    .shooting-star {
      position: fixed;
      width: 4px; height: 4px;
      background: #fff;
      border-radius: 50%;
      opacity: 0;
      z-index: 1;
      box-shadow: 0 0 6px 2px rgba(255,255,255,.6);
    }
    .shooting-star::after {
      content: '';
      position: absolute;
      top: 50%; left: 100%;
      transform: translateY(-50%);
      width: 80px; height: 2px;
      background: linear-gradient(to right, rgba(255,255,255,.7), transparent);
    }
    .shooting-star:nth-child(1) { animation: shoot1 6s  3s   ease-in infinite; }
    .shooting-star:nth-child(2) { animation: shoot2 8s  7s   ease-in infinite; }
    .shooting-star:nth-child(3) { animation: shoot3 10s 12s  ease-in infinite; }

    @keyframes shoot1 {
      0%   { opacity:0; top:10%; left:70%; }
      2%   { opacity:1; }
      12%  { opacity:0; top:35%; left:30%; }
      100% { opacity:0; }
    }
    @keyframes shoot2 {
      0%   { opacity:0; top:5%;  left:85%; }
      2%   { opacity:1; }
      10%  { opacity:0; top:30%; left:50%; }
      100% { opacity:0; }
    }
    @keyframes shoot3 {
      0%   { opacity:0; top:15%; left:60%; }
      2%   { opacity:1; }
      10%  { opacity:0; top:40%; left:20%; }
      100% { opacity:0; }
    }

    /* ───── Moon ───── */
    .moon {
      position: fixed;
      top: 8%; right: 12%;
      width: 100px; height: 100px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff8dc, #ffe9a0);
      box-shadow:
        0 0 40px 10px rgba(255,243,176,.35),
        0 0 80px 30px rgba(255,243,176,.15);
      z-index: 1;
      animation: moonGlow 4s ease-in-out infinite alternate;
    }
    .moon-crater {
      position: absolute;
      border-radius: 50%;
      background: rgba(210,190,140,.25);
    }
    .moon-crater:nth-child(1) { width:18px; height:18px; top:22%; left:20%; }
    .moon-crater:nth-child(2) { width:12px; height:12px; top:55%; left:55%; }
    .moon-crater:nth-child(3) { width:10px; height:10px; top:35%; left:60%; }

    @keyframes moonGlow {
      0%   { box-shadow: 0 0 40px 10px rgba(255,243,176,.35), 0 0 80px 30px rgba(255,243,176,.15); }
      100% { box-shadow: 0 0 60px 20px rgba(255,243,176,.45), 0 0 120px 50px rgba(255,243,176,.2); }
    }

    /* ───── Clouds ───── */
    .cloud {
      position: fixed;
      bottom: 6%;
      background: rgba(40, 40, 90, .45);
      border-radius: 50px;
      filter: blur(6px);
      z-index: 2;
    }
    .cloud::before, .cloud::after {
      content: '';
      position: absolute;
      background: inherit;
      border-radius: 50%;
    }
    .cloud-1 { width:220px; height:50px; left:-5%;  animation: driftRight 35s linear infinite; }
    .cloud-1::before { width:80px; height:80px; top:-40px; left:40px; }
    .cloud-1::after  { width:60px; height:60px; top:-30px; left:110px; }

    .cloud-2 { width:180px; height:40px; left:60%;  animation: driftLeft 40s linear infinite; }
    .cloud-2::before { width:60px; height:60px; top:-30px; left:30px; }
    .cloud-2::after  { width:50px; height:50px; top:-25px; left:90px; }

    @keyframes driftRight { 0%{transform:translateX(0)}100%{transform:translateX(120vw)} }
    @keyframes driftLeft  { 0%{transform:translateX(0)}100%{transform:translateX(-120vw)} }

    /* ───── Content card ───── */
    .card {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 50px 55px 45px;
      border-radius: 24px;
      background: rgba(255,255,255,.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 8px 32px rgba(0,0,0,.3);
      animation: fadeInUp 1.8s ease-out;
      max-width: 460px;
    }

    .greeting-emoji {
      font-size: 52px;
      margin-bottom: 10px;
      animation: bounce 2.5s ease-in-out infinite;
    }

    .greeting-title {
      font-family: 'Sacramento', cursive;
      font-size: 56px;
      color: #ffe9a0;
      text-shadow: 0 0 20px rgba(255,233,160,.3);
      margin-bottom: 6px;
    }

    .greeting-name {
      font-size: 22px;
      font-weight: 700;
      color: #d4b8ff;
      letter-spacing: 1px;
      margin-bottom: 22px;
    }

    .greeting-message {
      font-size: 30px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 18px;
      animation: pulse 3s ease-in-out infinite;
    }

    .greeting-sub {
      font-size: 15px;
      color: rgba(255,255,255,.6);
      line-height: 1.7;
      max-width: 340px;
      margin: 0 auto;
    }

    .sparkle-divider {
      margin: 18px auto;
      font-size: 14px;
      letter-spacing: 8px;
      color: rgba(255,233,160,.5);
    }

    .heart {
      display: inline-block;
      color: #ff8fbc;
      font-size: 20px;
      animation: heartbeat 1.4s ease-in-out infinite;
    }

    /* ───── Animations ───── */
    @keyframes fadeInUp {
      0%   { opacity:0; transform:translateY(40px); }
      100% { opacity:1; transform:translateY(0); }
    }
    @keyframes bounce {
      0%,100% { transform:translateY(0); }
      50%     { transform:translateY(-12px); }
    }
    @keyframes pulse {
      0%,100% { transform:scale(1); }
      50%     { transform:scale(1.04); }
    }
    @keyframes heartbeat {
      0%,100% { transform:scale(1); }
      15%     { transform:scale(1.25); }
      30%     { transform:scale(1); }
      45%     { transform:scale(1.2); }
    }

    /* ───── Responsive ───── */
    @media (max-width:520px) {
      .card { padding:35px 28px 30px; margin:0 16px; }
      .greeting-title { font-size:42px; }
      .greeting-message { font-size:24px; }
      .moon { width:70px; height:70px; top:5%; right:8%; }
    }
  </style>
</head>
<body>

  <!-- Stars (generated by JS below) -->
  <div class="stars-container" id="stars"></div>

  <!-- Shooting stars -->
  <div class="shooting-star"></div>
  <div class="shooting-star"></div>
  <div class="shooting-star"></div>

  <!-- Moon -->
  <div class="moon">
    <div class="moon-crater"></div>
    <div class="moon-crater"></div>
    <div class="moon-crater"></div>
  </div>

  <!-- Clouds -->
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>

  <!-- Card -->
  <div class="card">
    <div class="greeting-emoji">🌙</div>
    <div class="greeting-title">Good Night</div>
    <div class="greeting-name">tiny M.</div>
    <div class="sparkle-divider">&#10022; &#10022; &#10022;</div>
    <div class="greeting-message">Nighty night! <span class="heart">&hearts;</span></div>
    <div class="greeting-sub">
      Sweet dreams, little star.<br>
      The moon is watching over you tonight,<br>
      and so are all the tiny stars. &#11088;
    </div>
  </div>

  <script>
    // Generate twinkling stars
    const container = document.getElementById('stars');
    const count = 200;
    for (let i = 0; i < count; i++) {
      const s = document.createElement('div');
      s.classList.add('star');
      const size = Math.random() * 3 + 1;
      s.style.width  = size + 'px';
      s.style.height = size + 'px';
      s.style.top    = Math.random() * 100 + '%';
      s.style.left   = Math.random() * 100 + '%';
      s.style.setProperty('--dur', (Math.random() * 3 + 2) + 's');
      s.style.setProperty('--min-o', (Math.random() * 0.3 + 0.15).toFixed(2));
      s.style.animationDelay = (Math.random() * 5) + 's';
      container.appendChild(s);
    }
  </script>

</body>
</html>
